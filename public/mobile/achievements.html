<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#339999">
    <title>我的成就 - MDLooker</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #339999 0%, #2a7a7a 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .header-title {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
        }

        .stats-bar {
            background: white;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #f0f0f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #339999;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .content {
            padding: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .achievement-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .achievement-card.locked {
            opacity: 0.5;
        }

        .achievement-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
        }

        .achievement-card.locked .achievement-icon {
            background: #e0e0e0;
        }

        .achievement-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .achievement-desc {
            font-size: 12px;
            color: #999;
        }

        .achievement-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #4caf50;
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
        }

        .progress-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .progress-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .progress-item:last-child {
            border-bottom: none;
        }

        .progress-icon {
            width: 40px;
            height: 40px;
            background: #e3f2fd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .progress-info {
            flex: 1;
        }

        .progress-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .progress-bar {
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #339999, #2a7a7a);
            border-radius: 3px;
        }

        .progress-text {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 16px 28px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">我的成就</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value">8</div>
            <div class="stat-label">已获得</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">12</div>
            <div class="stat-label">总成就</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">67%</div>
            <div class="stat-label">完成度</div>
        </div>
    </div>

    <div class="content">
        <div class="section-title">🏆 已解锁成就</div>
        <div class="achievements-grid" id="unlockedAchievements">
            <!-- Unlocked achievements will be inserted here -->
        </div>

        <div class="section-title">🔒 待解锁成就</div>
        <div class="achievements-grid" id="lockedAchievements">
            <!-- Locked achievements will be inserted here -->
        </div>

        <div class="progress-section">
            <div class="section-title">📊 进度追踪</div>
            <div id="progressList">
                <!-- Progress items will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        const achievements = [
            { id: 1, icon: '🔍', name: '初识合规', desc: '完成首次搜索', unlocked: true },
            { id: 2, icon: '🔍', name: '搜索新手', desc: '完成10次搜索', unlocked: true },
            { id: 3, icon: '❤️', name: '收藏家', desc: '收藏5家企业', unlocked: true },
            { id: 4, icon: '📥', name: '下载达人', desc: '下载10份报告', unlocked: false },
            { id: 5, icon: '📅', name: '连续一周', desc: '连续7天使用', unlocked: false },
            { id: 6, icon: '🎯', name: '精准搜索', desc: '连续7天使用', unlocked: false }
        ];

        const progressData = [
            { icon: '🔍', name: '搜索次数', current: 12, total: 100 },
            { icon: '❤️', name: '收藏企业', current: 3, total: 20 },
            { icon: '📥', name: '下载报告', current: 0, total: 10 },
            { icon: '👁️', name: '浏览企业', current: 8, total: 50 }
        ];

        function loadAchievements() {
            const unlockedContainer = document.getElementById('unlockedAchievements');
            const lockedContainer = document.getElementById('lockedAchievements');

            const unlocked = achievements.filter(a => a.unlocked);
            const locked = achievements.filter(a => !a.unlocked);

            unlockedContainer.innerHTML = unlocked.map(a => `
                <div class="achievement-card">
                    <div class="achievement-badge">✓</div>
                    <div class="achievement-icon">${a.icon}</div>
                    <div class="achievement-name">${a.name}</div>
                    <div class="achievement-desc">${a.desc}</div>
                </div>
            `).join('');

            lockedContainer.innerHTML = locked.map(a => `
                <div class="achievement-card locked">
                    <div class="achievement-icon">🔒</div>
                    <div class="achievement-name">${a.name}</div>
                    <div class="achievement-desc">${a.desc}</div>
                </div>
            `).join('');
        }

        function loadProgress() {
            const container = document.getElementById('progressList');
            container.innerHTML = progressData.map(p => `
                <div class="progress-item">
                    <div class="progress-icon">${p.icon}</div>
                    <div class="progress-info">
                        <div class="progress-name">${p.name}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${(p.current / p.total) * 100}%"></div>
                        </div>
                        <div class="progress-text">${p.current}/${p.total}</div>
                    </div>
                </div>
            `).join('');
        }

        function goBack() {
            window.history.back();
        }

        // Load on page load
        loadAchievements();
        loadProgress();
    </script>
</body>
</html>
