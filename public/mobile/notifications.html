<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#339999">
    <title>消息通知 - MDLooker</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #339999 0%, #2a7a7a 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .header-title {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
        }
        
        .read-all-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            position: relative;
        }
        
        .tab.active {
            color: #339999;
            font-weight: 600;
        }
        
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: #339999;
            border-radius: 3px;
        }
        
        .tab-badge {
            display: inline-block;
            background: #f44336;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 4px;
        }
        
        .content {
            padding: 16px;
        }
        
        .notification-item {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            cursor: pointer;
            position: relative;
        }
        
        .notification-item.unread {
            background: #f0f9ff;
        }
        
        .notification-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        
        .icon-system { background: #e3f2fd; }
        .icon-company { background: #e8f5e9; }
        .icon-update { background: #fff3e0; }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .notification-desc {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .notification-time {
            font-size: 12px;
            color: #999;
        }
        
        .unread-dot {
            width: 8px;
            height: 8px;
            background: #339999;
            border-radius: 50%;
            position: absolute;
            top: 16px;
            right: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        
        .empty-icon {
            width: 100px;
            height: 100px;
            background: #e0e0e0;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        .empty-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .empty-desc {
            font-size: 14px;
            color: #999;
        }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 16px 28px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">消息通知</div>
        <button class="read-all-btn" onclick="readAll()">全部已读</button>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('all')">
            全部 <span class="tab-badge" id="allBadge">3</span>
        </div>
        <div class="tab" onclick="switchTab('system')">系统</div>
        <div class="tab" onclick="switchTab('company')">企业动态</div>
    </div>
    
    <div class="content" id="content">
        <!-- Notifications will be inserted here -->
    </div>
    
    <script>
        const notifications = [
            {
                id: 1,
                type: 'system',
                icon: '🎉',
                iconClass: 'icon-system',
                title: '欢迎加入 MDLooker',
                desc: '恭喜您完成注册！开始探索全球医疗器械合规信息平台吧。',
                time: '10分钟前',
                unread: true
            },
            {
                id: 2,
                type: 'company',
                icon: '🏢',
                iconClass: 'icon-company',
                title: '迈瑞医疗 新增FDA认证',
                desc: '您关注的迈瑞医疗新增了3个FDA产品认证，点击查看详情。',
                time: '2小时前',
                unread: true
            },
            {
                id: 3,
                type: 'update',
                icon: '📢',
                iconClass: 'icon-update',
                title: '数据更新提醒',
                desc: '本周新增500+企业数据，1000+产品注册信息已更新。',
                time: '昨天',
                unread: true
            },
            {
                id: 4,
                type: 'system',
                icon: '🎁',
                iconClass: 'icon-system',
                title: '每日任务完成奖励',
                desc: '恭喜您完成今日所有任务，获得75经验值！',
                time: '昨天',
                unread: false
            },
            {
                id: 5,
                type: 'company',
                icon: '🏥',
                iconClass: 'icon-company',
                title: '西门子医疗 信息更新',
                desc: '您关注的西门子医疗企业信息有更新。',
                time: '3天前',
                unread: false
            }
        ];
        
        let currentTab = 'all';
        
        function loadNotifications() {
            const content = document.getElementById('content');
            let filtered = notifications;
            
            if (currentTab !== 'all') {
                filtered = notifications.filter(n => n.type === currentTab);
            }
            
            if (filtered.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔔</div>
                        <div class="empty-title">暂无通知</div>
                        <div class="empty-desc">您的通知将显示在这里</div>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = filtered.map(n => `
                <div class="notification-item ${n.unread ? 'unread' : ''}" onclick="readNotification(${n.id})">
                    <div class="notification-icon ${n.iconClass}">${n.icon}</div>
                    <div class="notification-content">
                        <div class="notification-title">${n.title}</div>
                        <div class="notification-desc">${n.desc}</div>
                        <div class="notification-time">${n.time}</div>
                    </div>
                    ${n.unread ? '<div class="unread-dot"></div>' : ''}
                </div>
            `).join('');
            
            updateBadge();
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.tab').classList.add('active');
            loadNotifications();
        }
        
        function readNotification(id) {
            const notification = notifications.find(n => n.id === id);
            if (notification && notification.unread) {
                notification.unread = false;
                loadNotifications();
                showToast('已标记为已读');
            }
        }
        
        function readAll() {
            notifications.forEach(n => n.unread = false);
            loadNotifications();
            showToast('全部已读');
        }
        
        function updateBadge() {
            const unreadCount = notifications.filter(n => n.unread).length;
            document.getElementById('allBadge').textContent = unreadCount;
        }
        
        function goBack() {
            window.history.back();
        }
        
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 2000);
        }
        
        // Load on page load
        loadNotifications();
    </script>
</body>
</html>
