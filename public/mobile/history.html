<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#339999">
    <title>搜索历史 - MDLooker</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #339999 0%, #2a7a7a 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .header-title {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
        }
        
        .clear-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        .content {
            padding: 16px;
        }
        
        .date-section {
            margin-bottom: 20px;
        }
        
        .date-title {
            font-size: 14px;
            color: #999;
            margin-bottom: 12px;
            padding-left: 8px;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .history-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .history-icon {
            width: 40px;
            height: 40px;
            background: #f5f5f5;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .history-content {
            flex: 1;
        }
        
        .history-query {
            font-size: 15px;
            color: #333;
            margin-bottom: 4px;
        }
        
        .history-meta {
            font-size: 12px;
            color: #999;
        }
        
        .history-arrow {
            color: #ccc;
            font-size: 18px;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        
        .empty-icon {
            width: 100px;
            height: 100px;
            background: #e0e0e0;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        .empty-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .empty-desc {
            font-size: 14px;
            color: #999;
        }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 16px 28px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">搜索历史</div>
        <button class="clear-btn" onclick="clearHistory()">清空</button>
    </div>
    
    <div class="content" id="content">
        <!-- History content will be inserted here -->
    </div>
    
    <script>
        // Mock history data
        let historyData = [
            { query: '迈瑞医疗', type: 'company', time: '10:30', date: '今天', results: 3 },
            { query: '监护仪', type: 'product', time: '09:15', date: '今天', results: 156 },
            { query: 'Medtronic', type: 'company', time: '昨天', date: '昨天', results: 1 },
            { query: 'FDA 注册证', type: 'compliance', time: '昨天', date: '昨天', results: 89 },
            { query: '西门子医疗', type: 'company', time: '3天前', date: '更早', results: 1 },
            { query: '超声诊断设备', type: 'product', time: '3天前', date: '更早', results: 234 }
        ];
        
        const typeIcons = {
            company: '🏢',
            product: '📦',
            compliance: '📋'
        };
        
        function loadHistory() {
            const content = document.getElementById('content');
            
            if (historyData.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-title">暂无搜索历史</div>
                        <div class="empty-desc">您的搜索记录将显示在这里</div>
                    </div>
                `;
                return;
            }
            
            // Group by date
            const grouped = historyData.reduce((acc, item) => {
                if (!acc[item.date]) acc[item.date] = [];
                acc[item.date].push(item);
                return acc;
            }, {});
            
            content.innerHTML = Object.entries(grouped).map(([date, items]) => `
                <div class="date-section">
                    <div class="date-title">${date}</div>
                    <div class="history-list">
                        ${items.map(item => `
                            <div class="history-item" onclick="searchAgain('${item.query}')">
                                <div class="history-icon">${typeIcons[item.type]}</div>
                                <div class="history-content">
                                    <div class="history-query">${item.query}</div>
                                    <div class="history-meta">${item.time} · ${item.results} 条结果</div>
                                </div>
                                <div class="history-arrow">›</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function goBack() {
            window.history.back();
        }
        
        function searchAgain(query) {
            window.location.href = 'index.html?search=' + encodeURIComponent(query);
        }
        
        function clearHistory() {
            if (confirm('确定要清空搜索历史吗？')) {
                historyData = [];
                loadHistory();
                showToast('已清空搜索历史');
            }
        }
        
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 2000);
        }
        
        // Load on page load
        loadHistory();
    </script>
</body>
</html>
